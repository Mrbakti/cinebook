<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Login - CineBook</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav>
  <a href="/" class="logo">CINE<span>BOOK</span></a>
  <ul>
    <li><a th:href="@{/register}">Register</a></li>
  </ul>
</nav>

<div class="form-container">
  <h2>SIGN IN</h2>
  <p class="form-subtitle">Access your account</p>

  <div th:if="${param.error}" class="alert alert-danger">Invalid username or password.</div>
  <div th:if="${param.logout}" class="alert alert-success">You have been logged out.</div>
  <div th:if="${param.registered}" class="alert alert-success">Account created. Please sign in.</div>

  <form method="post" th:action="@{/login}">
    <div class="form-group">
      <label>Username</label>
      <input type="text" name="username" required>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" required>
    </div>
    <button type="submit" class="btn btn-primary" style="width:100%">Sign In</button>
  </form>
  <p style="margin-top: 20px; text-align: center; color: var(--gray); font-size: 0.85rem;">
    No account? <a th:href="@{/register}" style="color: var(--red);">Register</a>
  </p>
</div>
</body>
</html>
