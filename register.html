<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Register - CineBook</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav>
  <a href="/" class="logo">CINE<span>BOOK</span></a>
  <ul>
    <li><a th:href="@{/login}">Login</a></li>
  </ul>
</nav>

<div class="form-container">
  <h2>CREATE ACCOUNT</h2>
  <p class="form-subtitle">Join CineBook today</p>

  <form method="post" th:action="@{/register}">
    <div class="form-group">
      <label>Username</label>
      <input type="text" name="username" required>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" name="email" required>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" required>
    </div>
    <button type="submit" class="btn btn-primary" style="width:100%">Create Account</button>
  </form>
  <p style="margin-top: 20px; text-align: center; color: var(--gray); font-size: 0.85rem;">
    Already have an account? <a th:href="@{/login}" style="color: var(--red);">Sign in</a>
  </p>
</div>
</body>
</html>
